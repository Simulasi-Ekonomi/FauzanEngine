name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: editor/package-lock.json

    - name: Build Editor (React)
      run: |
        cd editor
        npm ci
        npm run build
        mkdir -p ../android/app/src/main/assets/editor
        cp -r dist/* ../android/app/src/main/assets/editor/

    - name: Setup NDK
      run: |
        echo "y" | sdkmanager "ndk;26.1.10909125"
        echo "y" | sdkmanager "cmake;3.22.1"

    - name: Grant Gradle permission
      run: chmod +x android/gradlew

    - name: Build Debug APK
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: NeoEngine-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

  build-release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: editor/package-lock.json

    - name: Build Editor
      run: |
        cd editor
        npm ci
        npm run build
        mkdir -p ../android/app/src/main/assets/editor
        cp -r dist/* ../android/app/src/main/assets/editor/

    - name: Setup NDK
      run: |
        echo "y" | sdkmanager "ndk;26.1.10909125"
        echo "y" | sdkmanager "cmake;3.22.1"

    - name: Grant Gradle permission
      run: chmod +x android/gradlew

    - name: Build Release APK
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
      run: |
        cd android
        if [ -n "$KEYSTORE_BASE64" ]; then
          echo "$KEYSTORE_BASE64" | base64 -d > app/neoengine.keystore
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/neoengine.keystore \
            -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --no-daemon
        else
          ./gradlew assembleRelease --no-daemon
        fi

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: NeoEngine-Release-APK
        path: android/app/build/outputs/apk/release/app-release*.apk
        retention-days: 90

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: android/app/build/outputs/apk/release/app-release*.apk
        generate_release_notes: true
